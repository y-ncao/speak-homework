services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn app.server:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - tutor-data:/app/data

  agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python agent.py dev
    env_file: .env
    depends_on:
      - api
    volumes:
      - tutor-data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  tutor-data:
